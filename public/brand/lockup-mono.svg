<svg xmlns="http://www.w3.org/2000/svg" width="820" height="220" viewBox="0 0 820 220" role="img" aria-label="Shotgun logo (monochrome)" fill="currentColor">
  <!-- Single-color version. Control color via CSS `color:` on the element, or set fill on this <svg>.
       Defaults to gold if no color is inherited. Outline <text> to <path> for static export. -->
  <defs>
    <style>
      svg { color: #F6C544; }
      .wm { font-family: 'Anton', 'Arial Narrow', 'Arial Black', Impact, sans-serif; letter-spacing: 2px; }
    </style>
  </defs>

  <!-- buzzer glyph, line-art -->
  <g transform="translate(110,110)" stroke="currentColor" fill="none">
    <g stroke-width="5" stroke-linecap="round" opacity="0.9">
      <line x1="0" y1="-78" x2="0" y2="-90"/>
      <line x1="0" y1="78"  x2="0" y2="90"/>
      <line x1="-78" y1="0" x2="-90" y2="0"/>
      <line x1="78" y1="0"  x2="90" y2="0"/>
      <line x1="-55" y1="-55" x2="-64" y2="-64"/>
      <line x1="55" y1="55"  x2="64" y2="64"/>
      <line x1="55" y1="-55" x2="64" y2="-64"/>
      <line x1="-55" y1="55" x2="-64" y2="64"/>
    </g>
    <circle cx="0" cy="0" r="64" stroke-width="8"/>
    <circle cx="0" cy="0" r="34" stroke-width="8"/>
  </g>

  <!-- wordmark, solid currentColor (O kept hollow to preserve the buzzer cue) -->
  <text x="222" y="158" class="wm" font-size="138" fill="currentColor">SH<tspan fill="none" stroke="currentColor" stroke-width="3">O</tspan>TGUN</text>
</svg>
