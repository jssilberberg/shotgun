<svg xmlns="http://www.w3.org/2000/svg" width="820" height="220" viewBox="0 0 820 220" role="img" aria-label="Shotgun logo">
  <!-- Wordmark uses the document's loaded fonts (Anton display, see design tokens).
       For final/static export, outline the <text> to <path> so it renders without the font. -->
  <defs>
    <radialGradient id="dome2" cx="0.38" cy="0.32" r="0.85">
      <stop offset="0" stop-color="#FF7E97"/>
      <stop offset="0.45" stop-color="#F5294E"/>
      <stop offset="1" stop-color="#B3102F"/>
    </radialGradient>
    <radialGradient id="hot2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <style>
      .wm { font-family: 'Anton', 'Arial Narrow', 'Arial Black', Impact, sans-serif; letter-spacing: 2px; }
    </style>
  </defs>

  <!-- buzzer glyph (no tile) -->
  <g transform="translate(110,110)">
    <g stroke="#F6C544" stroke-width="5" stroke-linecap="round" opacity="0.9">
      <line x1="0" y1="-78" x2="0" y2="-90"/>
      <line x1="0" y1="78"  x2="0" y2="90"/>
      <line x1="-78" y1="0" x2="-90" y2="0"/>
      <line x1="78" y1="0"  x2="90" y2="0"/>
      <line x1="-55" y1="-55" x2="-64" y2="-64"/>
      <line x1="55" y1="55"  x2="64" y2="64"/>
      <line x1="55" y1="-55" x2="64" y2="-64"/>
      <line x1="-55" y1="55" x2="-64" y2="64"/>
    </g>
    <circle cx="0" cy="0" r="64" fill="none" stroke="#F6C544" stroke-width="8"/>
    <circle cx="0" cy="0" r="50" fill="url(#dome2)"/>
    <ellipse cx="-14" cy="-12" rx="20" ry="13" fill="url(#hot2)"/>
  </g>

  <!-- wordmark -->
  <text x="222" y="158" class="wm" font-size="138" fill="#F6C544">SH<tspan fill="#F5294E">O</tspan>TGUN</text>
</svg>
